name: untitiled
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  location: ^5.0.3
  flutter_typeahead: ^5.2.0
  shared_preferences: ^2.2.2
  flutter_advanced_switch: ^3.1.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  flutter_background_service: ^5.0.5
  rename_app: ^1.3.2

  # REMOVED background_location (broken, incompatible)

  audio_service: ^0.18.13
  sound_mode: ^3.0.0
  just_audio_background: ^0.0.1-beta.11
  just_audio: ^0.9.44       # pin to working version instead of 'any'
  just_audio_platform_interface: ^4.0.0
  just_audio_web: ^0.4.0
  vibration: ^2.0.0
  alarmplayer: ^2.0.0
  connectivity_plus: ^7.1.0
  awesome_notifications: ^0.11.0
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  audioplayers: ^5.2.1
  flutter_local_notifications: ^18.0.1
  google_mobile_ads: ^7.0.0
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1
  file_picker: ^10.3.10
  flutter_email_sender: ^8.0.0
  flutter_launcher_icons: ^0.14.4
  google_places_flutter: ^2.0.9
  google_maps_webservice: ^0.0.20-nullsafety.5
  lottie: ^3.3.2
  auto_size_text: ^3.0.0
  google_fonts: ^8.0.2
  flutter_ringtone_player: ^4.0.0+4
  path_provider: ^2.1.5
  torch_light: ^1.1.0
  get: ^4.7.3

dependency_overrides:
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/play_store_512.png"
  image_path: "assets/icon/play_store_512.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/alarm1.mp3
    - assets/alarm2.mp3
    - assets/alarm3.mp3
    - assets/alarm4.mp3
    - assets/alarm5.mp3
    - assets/alarm6.mp3
    - assets/alarm7.mp3
    - assets/alarm8.mp3
    - assets/alarm9.mp3
    - assets/alarm10.mp3
